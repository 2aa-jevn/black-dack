<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BLACK DACK Admin</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>BLACK DACK</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active" data-page="dashboard">📊 Dashboard</a>
                <a href="#" class="nav-item" data-page="products">📦 Produits</a>
                <a href="#" class="nav-item" data-page="orders">📋 Commandes</a>
                <a href="#" class="nav-item" data-page="promotions">🏷️ Promotions</a>
                <a href="#" class="nav-item" onclick="logout()">🚪 Déconnexion</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <header class="admin-header">
                <h1>Dashboard</h1>
                <div class="admin-user">
                    <span id="admin-email"></span>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <section class="dashboard-stats">
                <div class="stat-card">
                    <h3>Produits</h3>
                    <p class="stat-value" id="total-products">0</p>
                </div>
                <div class="stat-card">
                    <h3>Ventes</h3>
                    <p class="stat-value" id="total-sales">0 FCFA</p>
                </div>
                <div class="stat-card">
                    <h3>Commandes en attente</h3>
                    <p class="stat-value" id="pending-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Promotions actives</h3>
                    <p class="stat-value" id="active-promotions">0</p>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="quick-actions">
                <h2>Actions rapides</h2>
                <div class="actions-grid">
                    <button class="action-btn" onclick="navigateTo('products')">+ Ajouter un produit</button>
                    <button class="action-btn" onclick="navigateTo('orders')">📋 Voir les commandes</button>
                    <button class="action-btn" onclick="navigateTo('promotions')">🏷️ Créer une promotion</button>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/admin.js"></script>
</body>
</html>
