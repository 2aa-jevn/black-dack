<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BLACK DACK</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img src="assets/logo/logo.svg" alt="BLACK DACK" class="logo">
                <span class="brand-name">BLACK DACK</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="collection.html">Collections</a></li>
                <li><a href="histoire.html">Histoire</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact">
        <div class="container">
            <h1>Nous Contacter</h1>
            
            <div class="contact-content">
                <!-- Contact Info -->
                <div class="contact-info">
                    <h2>BLACK DACK STUDIO</h2>
                    <p>📍 Bamako, Mali 🇲🇱</p>
                    
                    <h3>Nous suivre</h3>
                    <ul class="social-links">
                        <li><a href="#" target="_blank">📱 WhatsApp</a></li>
                        <li><a href="#" target="_blank">📷 Instagram</a></li>
                    </ul>
                </div>

                <!-- Contact Form -->
                <div class="contact-form">
                    <h2>Formulaire de Contact</h2>
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Nom</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Téléphone</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Envoyer</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 BLACK DACK. Tous droits réservés.</p>
            <p>Créé pour être unique.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
